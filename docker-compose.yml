version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: deepquest_postgres
    environment:
      POSTGRES_USER: deepquest
      POSTGRES_PASSWORD: deepquestpassword
      POSTGRES_DB: deepquestdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: deepquest_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    container_name: deepquest_neo4j
    environment:
      NEO4J_AUTH: neo4j/deepquestpassword
    ports:
      - "7474:7474"  # HTTP Web Interface
      - "7687:7687"  # Bolt protocol
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
